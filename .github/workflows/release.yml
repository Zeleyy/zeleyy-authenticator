name: publish

on:
  push:
    branches:
      - main

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm install

      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install openssl -y
          echo "OPENSSL_DIR=C:\Program Files\OpenSSL" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\Program Files\OpenSSL\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\Program Files\OpenSSL\include" >> $env:GITHUB_ENV

      - name: Build Desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseDraft: true
          args: ${{ matrix.args }}

      - name: Upload updater JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ runner.os }}
          path: src-tauri/target/release/bundle/**/latest.json
          overwrite: true

  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      
      - name: Extract version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'

      - name: Setup NDK env
        run: |
          NDK_PATH=$ANDROID_HOME/ndk/25.2.9519653
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Install frontend deps
        run: npm install

      - name: Init Android
        run: npm run tauri android init

      - name: Sync Android Configuration
        run: |
          cp src-tauri/android-config/AndroidManifest.xml src-tauri/gen/android/app/src/main/AndroidManifest.xml
      
      - name: Copy Android icons
        run: |
          cp -r src-tauri/icons/android/* src-tauri/gen/android/app/src/main/res/

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > upload-keystore.jks

      - name: Build APK
        run: npm run tauri android build
      
      - name: Sign APK
        run: |
          APK_PATH="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          SIGNED_APK_PATH="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks upload-keystore.jks \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --out $SIGNED_APK_PATH \
            $APK_PATH

      - name: Prepare APK
        run: |
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk \
             zeleyy-authenticator.apk

      - name: Upload APK to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          files: zeleyy-authenticator.apk
          tag_name: v${{ steps.get_version.outputs.pkg_version }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: zeleyy-authenticator.apk

  publish-release:
    needs: [build-tauri, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Extract version
        id: get_version
        run: |
          echo "pkg_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Patch latest.json for Android
        run: |
          VERSION="${{ steps.get_version.outputs.pkg_version }}"
          APK_URL="https://github.com/Zeleyy/zeleyy-authenticator/releases/download/v$VERSION/zeleyy-authenticator.apk"
          
          JSON_PATH=$(find all-artifacts -name "latest.json" | head -n 1)
          
          if [ -z "$JSON_PATH" ]; then
            exit 1
          fi
          
          jq --arg url "$APK_URL" '. + {android_url: $url}' "$JSON_PATH" > latest_patched.json
          
          mv latest_patched.json latest.json

      - name: Finalize Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.pkg_version }}
          draft: false
          files: |
            latest.json
            all-artifacts/android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}