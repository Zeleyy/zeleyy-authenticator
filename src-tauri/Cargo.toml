[package]
name = "zeleyy-authenticator"
version = "0.2.0"
description = "TOTP authenticator app for managing 2FA codes"
authors = ["Zeleyy"]
edition = "2021"

[lib]
name = "zeleyy_authenticator_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-store = "2.4.2"
keyring = "2.3.3"
rand = "0.10.0"
sqlx = { version = "0.8.6", features = ["runtime-tokio", "sqlite"] }
libsqlite3-sys = { version = "0.30.1", features = ["bundled-sqlcipher"] }
tokio = { version = "1.51.1", features = ["full"] }
openssl = { version = "0.10.76", features = ["vendored"] }
totp-lite = "2.0.1"
base32 = "0.5.1"
data-encoding = "2.10.0"
tauri-plugin-process = "2"
tauri-plugin-clipboard-manager = "2"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-updater = "2"
